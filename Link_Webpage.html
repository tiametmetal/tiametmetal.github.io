<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jake Vandrake | Links</title>
  <style>
    :root {
      --bg: #0e0e11;
      --card: #16161c;
      --text: #eaeaf0;
      --muted: #9a9aa5;
      --accent: #7aa2f7;
      --accent-hover: #9bb7ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1b23, var(--bg));
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 2rem 1.75rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }

    .profile {
      text-align: center;
      margin-bottom: 1.75rem;
    }

   .avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  object-fit: cover;
  object-position: center top;
  display: block;
  margin: 0 auto 1rem auto;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
}


    .profile h1 {
      font-size: 1.5rem;
      margin-bottom: 0.25rem;
    }

    .profile p {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .links {
      display: grid;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1rem;
      background: #1f1f28;
      color: var(--text);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
    }

    .link:hover {
      background: var(--accent);
      color: #0e0e11;
      transform: translateY(-2px);
    }

    footer {
      margin-top: 1.75rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <header class="profile">
        <img class="avatar" src="VandrakeP_Metal_Pose.png" alt="Jake Vandrake Avatar">
        <h1>Jake Vandrake</h1>
        <p>Current Projects and Interests</p>
      </header>

      <nav class="links">
        <!-- Replace # with your actual links -->
        <a class="link" href="https://tiametmetal.github.io/BlackstarOdysseyBlog.html" target="_blank">Black Star Oddyssey Blog</a>
        <a class="link" href=" https://bandcamp.com/thrust2121" target="_blank">Bandcamp</a>
        <a class="link" href="http://www.youtube.com/@TalonKierst" target="_blank">YouTube</a>
        <a class="link" href="https://steamcommunity.com/id/jakevandrake/" target="_blank">Steam</a>
      </nav>

      <footer>
        © 2026 Jake Vandrake
      </footer>
    </section>
  </main>
</body>
</html>
